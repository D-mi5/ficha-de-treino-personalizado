<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="ff" x1="53" y1="107" x2="458" y2="405" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d84b63"/>
      <stop offset="45%" stop-color="#A45CFF"/>
      <stop offset="100%" stop-color="#41FF8D"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5FF4A"/>
      <stop offset="100%" stop-color="#41FF8D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle glow circle -->
  <circle cx="256" cy="240" r="197" fill="#A45CFF" opacity="0.06"/>

  <!-- "FF" monogram — two bold stylized F letters -->
  <!-- First F -->
  <rect x="74" y="117" width="30" height="278" rx="14" fill="url(#ff)"/>
  <rect x="74" y="117" width="160" height="30" rx="14" fill="url(#ff)"/>
  <rect x="74" y="229" width="128" height="30" rx="14" fill="url(#ff)"/>

  <!-- Second F -->
  <rect x="274" y="117" width="30" height="278" rx="14" fill="url(#ff)"/>
  <rect x="274" y="117" width="160" height="30" rx="14" fill="url(#ff)"/>
  <rect x="274" y="229" width="128" height="30" rx="14" fill="url(#ff)"/>

  <!-- Accent dot between the two F's -->
  <circle cx="256" cy="400" r="13" fill="url(#dot)"/>

  <!-- Top sparkle dots -->
  <circle cx="438" cy="74" r="9" fill="#F5FF4A" opacity="0.9"/>
  <circle cx="74" cy="438" r="7" fill="#41FF8D" opacity="0.7"/>
</svg>
