<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08163A" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/icons/icon-192.svg" type="image/svg+xml" />
    <title>Sem conexão</title>
    <link rel="stylesheet" href="./styles/output.css" />
  </head>
  <body class="page-shell">
    <main class="page-main mx-auto max-w-2xl">
      <section class="glow-panel p-6 sm:p-8 md:p-10 text-center">
        <p class="text-sm uppercase tracking-[0.24em] text-neonYellow">Modo Offline</p>
        <h1 class="mt-3 text-3xl font-extrabold">Você está sem conexão no momento</h1>
        <p class="mt-4 text-white/85">
          Não se preocupe. Assim que a internet voltar, você poderá continuar e gerar seu plano normalmente.
        </p>
        <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-center">
          <a href="/" class="neon-button w-full sm:w-auto">Voltar ao início</a>
          <button onclick="window.location.reload()" class="w-full rounded-xl border border-white/30 px-6 py-3 font-semibold sm:w-auto">
            Tentar novamente
          </button>
        </div>
      </section>
    </main>
    <script src="./scripts/pwa.js"></script>
  </body>
</html>
